<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <meta content="Advice generator site" name="keywords">
  <meta content="Advice generator" name="description">
  <meta content="Bismarck" name="author">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Manrope">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Advice generator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(227, 17%, 74%); }
  </style>
</head>
<body>

  <!-- Advice ID goes here -->
<div class="advice-co">
  <div class="title">
    ADVICE  #<span id="id">117</span>
  </div>
  <div class="body">
    <p id="output">
      "It is easy to sit up and take notice, what's difficult is getting up and taking action."
    </p>
  </div>
  <div class="play">
    <img src="./images/pattern-divider-desktop.svg" alt="">
  </div>
  <div class="playM">
    <img src="./images/pattern-divider-mobile.svg" alt="">
  </div>
  <div onclick="main()" class="btn">
    <img src="./images/icon-dice.svg" alt="">
  </div>
</div>
  <!-- Advice text goes here -->
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Abcmah">Bismarck</a>.
  </div>
  <script src="./main.js"></script>
</body>
</html>
